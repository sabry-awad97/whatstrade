# Environment variables are loaded from .env file
# Copy .env.example to .env and configure your values
# DO NOT commit .env to version control

services:
  postgres:
    image: postgres:15-alpine
    container_name: whatstrade-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatstrade}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatstrade-network

  whatsapp-service:
    build:
      context: ./services/whatsapp
      dockerfile: Dockerfile
    container_name: whatstrade-whatsapp
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${WHATSAPP_SERVICE_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WHATSAPP_LOG_LEVEL: ${WHATSAPP_LOG_LEVEL:-INFO}
    ports:
      - "${WHATSAPP_SERVICE_PORT:-8080}:${WHATSAPP_SERVICE_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - whatstrade-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${WHATSAPP_SERVICE_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    container_name: whatstrade-server
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WHATSAPP_SERVICE_URL: ${WHATSAPP_SERVICE_URL:-http://whatsapp-service:8080}
      PORT: ${SERVER_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      whatsapp-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - whatstrade-network

# ============================================
# AI Models (Docker Model Runner)
# Requires: Docker Compose v2.38+ and Docker Model Runner enabled
# ============================================
models:
  llm:
    model: ${AI_MODEL:-ai/gemma4:latest}
    context_size: 4096
    runtime_flags:
      - "--verbose"
      - "--log-prefix"
      - "--temp"
      - "0.7"

volumes:
  postgres_data:
    driver: local

networks:
  whatstrade-network:
    driver: bridge
