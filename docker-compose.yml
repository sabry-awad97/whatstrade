# Environment variables are loaded from .env file
# Copy .env.example to .env and configure your values
# DO NOT commit .env to version control

services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: postgres:latest
    container_name: whatstrade-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatstrade}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
       
      # PostgreSQL configuration
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

       # Timezone
      TZ: UTC
      PGTZ: UTC

    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      # Custom PostgreSQL configuration
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro

      # Initialization scripts (run on first start)
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

      # Backup directory
      - ./docker/postgres/backups:/backups

    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatstrade-network

# ============================================
# AI Models (Docker Model Runner)
# Requires: Docker Compose v2.38+ and Docker Model Runner enabled
# ============================================
models:
  llm:
    model: ${AI_MODEL:-ai/gemma4:latest}
    context_size: 4096
    runtime_flags:
      - "--verbose"
      - "--log-prefix"
      - "--temp"
      - "0.7"

volumes:
  postgres_data:
    driver: local

networks:
  whatstrade-network:
    driver: bridge
