version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: whatstrade-postgres
    environment:
      POSTGRES_DB: whatstrade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatstrade-network

  whatsapp-service:
    build:
      context: ./services/whatsapp
      dockerfile: Dockerfile
    container_name: whatstrade-whatsapp
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/whatstrade
      PORT: 8080
      LOG_LEVEL: info
      WHATSAPP_LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - whatstrade-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    container_name: whatstrade-server
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/whatstrade
      WHATSAPP_SERVICE_URL: http://whatsapp-service:8080
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      whatsapp-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - whatstrade-network

volumes:
  postgres_data:
    driver: local

networks:
  whatstrade-network:
    driver: bridge
