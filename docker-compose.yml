# ═══════════════════════════════════════════════════════════════════════════════
#  WhatsTrade - Docker Compose Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#  Production-ready PostgreSQL with pgvector and pg_textsearch extensions
# ═══════════════════════════════════════════════════════════════════════════════

name: whatstrade

services:
  # ─────────────────────────────────────────────────────────────────────────────
  #  PostgreSQL Database
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: whatstrade-postgres
    environment:
      POSTGRES_DB: whatstrade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      # Persistent data storage
      - whatstrade_postgres_data:/var/lib/postgresql/data
      # Custom PostgreSQL configuration
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      # Initialization scripts (run on first start)
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      # Backup directory
      - ./docker/postgres/backups:/backups
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whatstrade"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - whatstrade-network

  # ─────────────────────────────────────────────────────────────────────────────
  #  pgAdmin (Optional - Database Management UI)
  # ─────────────────────────────────────────────────────────────────────────────
  # Uncomment to enable pgAdmin web interface
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: whatstrade-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@whatstrade.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   ports:
  #     - "5050:80"
  #   volumes:
  #     - whatstrade_pgadmin_data:/var/lib/pgadmin
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped
  #   networks:
  #     - whatstrade-network

# ─────────────────────────────────────────────────────────────────────────────
#  Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  whatstrade_postgres_data:
    name: whatstrade_postgres_data
    driver: local
  # whatstrade_pgadmin_data:
  #   name: whatstrade_pgadmin_data
  #   driver: local

# ─────────────────────────────────────────────────────────────────────────────
#  Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  whatstrade-network:
    name: whatstrade-network
    driver: bridge
